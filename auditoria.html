<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checklist Auditoría BPM/HACCP — Ecuador</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0ede6;margin:0}
.page{max-width:1000px;margin:auto;padding:20px}

.hdr{background:linear-gradient(135deg,#1a3d05,#357a10);color:#fff;padding:25px;border-radius:16px;margin-bottom:20px}
.hdr h1{margin:0}

.score{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
.check-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border-left:5px solid #ccc}
.ci-cumple{border-left-color:#4caf50}
.ci-no{border-left-color:#f44336}
.ci-na{border-left-color:#999}

.btn{padding:6px 12px;margin:4px;border:1px solid #ccc;border-radius:6px;cursor:pointer}
.active-C{background:#d4edda}
.active-N{background:#f8d7da}
.active-NA{background:#eee}
</style>
</head>

<body>

<div class="page">

<div class="hdr">
<h1>Checklist de Cumplimiento<br>BPM / HACCP</h1>
<p>Auditoría de Buenas Prácticas de Manufactura y sistema HACCP en plantas de alimentos (Ecuador)</p>
</div>

<div class="score">
<b>Cumple:</b> <span id="c">0</span> |
<b>No Cumple:</b> <span id="n">0</span> |
<b>N/A:</b> <span id="na">0</span> |
<b>%:</b> <span id="pct">0%</span>
</div>

<div id="app"></div>

</div>

<script>

const CRITERIOS = [
{sec:"A - Instalaciones",t:"Instalaciones en buen estado"},
{sec:"A - Instalaciones",t:"Flujo evita contaminación cruzada"},
{sec:"A - Instalaciones",t:"Iluminación adecuada"},
{sec:"A - Instalaciones",t:"Agua potable disponible"},
{sec:"A - Instalaciones",t:"Superficies sanitarias"},
{sec:"A - Instalaciones",t:"Manejo de residuos"},

{sec:"B - Personal",t:"Uso de EPP"},
{sec:"B - Personal",t:"Lavado de manos"},
{sec:"B - Personal",t:"Uniforme limpio"},
{sec:"B - Personal",t:"Sin objetos personales"},
{sec:"B - Personal",t:"Capacitación BPM"},

{sec:"C - Limpieza",t:"Programa de limpieza"},
{sec:"C - Limpieza",t:"Uso de desinfectantes"},
{sec:"C - Limpieza",t:"Registros de limpieza"},
{sec:"C - Limpieza",t:"Validación de limpieza"},

{sec:"D - Plagas",t:"Control de plagas"},
{sec:"D - Plagas",t:"Sin infestación"},
{sec:"D - Plagas",t:"Registros de plagas"},

{sec:"E - HACCP",t:"Análisis de peligros"},
{sec:"E - HACCP",t:"CCP definidos"},
{sec:"E - HACCP",t:"Límites críticos"},
{sec:"E - HACCP",t:"Monitoreo"},
{sec:"E - HACCP",t:"Acciones correctivas"},

{sec:"F - Procesos",t:"Trazabilidad"},
{sec:"F - Procesos",t:"Control de temperatura"},
{sec:"F - Procesos",t:"Control de materia prima"},

{sec:"G - Documentación",t:"Cumple ARCSA"},
{sec:"G - Documentación",t:"Registros firmados"},
{sec:"G - Documentación",t:"Procedimientos actualizados"}
];

let state = {};

function render(){
  let app=document.getElementById("app");
  let actual="";

  CRITERIOS.forEach((c,i)=>{
    state[i]="none";

    if(c.sec!==actual){
      actual=c.sec;
      let h=document.createElement("h3");
      h.textContent="Sección "+c.sec;
      app.appendChild(h);
    }

    let div=document.createElement("div");
    div.className="check-item";
    div.id="item-"+i;

    div.innerHTML=`
      <b>${c.t}</b><br><br>
      <button class="btn" onclick="setVal(${i},'C')">Cumple</button>
      <button class="btn" onclick="setVal(${i},'N')">No Cumple</button>
      <button class="btn" onclick="setVal(${i},'NA')">N/A</button>
    `;

    app.appendChild(div);
  });
}

function setVal(i,val){
  state[i]=val;
  let el=document.getElementById("item-"+i);

  el.classList.remove("ci-cumple","ci-no","ci-na");
  if(val==="C") el.classList.add("ci-cumple");
  if(val==="N") el.classList.add("ci-no");
  if(val==="NA") el.classList.add("ci-na");

  update();
}

function update(){
  let c=0,n=0,na=0;

  Object.values(state).forEach(v=>{
    if(v==="C") c++;
    if(v==="N") n++;
    if(v==="NA") na++;
  });

  let aplica=c+n;
  let pct=aplica?Math.round(c/aplica*100):0;

  document.getElementById("c").textContent=c;
  document.getElementById("n").textContent=n;
  document.getElementById("na").textContent=na;
  document.getElementById("pct").textContent=pct+"%";
}

render();

</script>

</body>
</html>

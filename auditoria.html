<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checklist Auditoría BPM/HACCP — Ecuador</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f5f5f0;
  padding:20px;
}
h1{text-align:center}

.check-item{
  background:#fff;
  border-radius:10px;
  padding:15px;
  margin-bottom:10px;
  border-left:5px solid #ccc;
}
.ci-cumple{border-left-color:green}
.ci-no{border-left-color:red}
.ci-na{border-left-color:gray}

.btn{
  padding:6px 10px;
  border:1px solid #ccc;
  cursor:pointer;
  margin-right:5px;
}
.active-C{background:#d4edda}
.active-N{background:#f8d7da}
.active-NA{background:#eee}

.score{
  background:#fff;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Auditoría BPM / HACCP<br>Plantas de Alimentos · Ecuador</h1>

<div class="score">
  <b>Cumple:</b> <span id="c">0</span> |
  <b>No Cumple:</b> <span id="n">0</span> |
  <b>N/A:</b> <span id="na">0</span> |
  <b>%:</b> <span id="pct">0%</span>
</div>

<div id="app"></div>

<script>

const CRITERIOS = [
/* INSTALACIONES */
{sec:"A - Instalaciones",t:"Instalaciones en buen estado"},
{sec:"A - Instalaciones",t:"Flujo evita contaminación cruzada"},
{sec:"A - Instalaciones",t:"Iluminación y ventilación adecuadas"},

/* PERSONAL */
{sec:"B - Personal",t:"Uso correcto de EPP"},
{sec:"B - Personal",t:"Lavado de manos adecuado"},
{sec:"B - Personal",t:"Personal capacitado en BPM"},

/* LIMPIEZA */
{sec:"C - Limpieza",t:"Programa de limpieza documentado"},
{sec:"C - Limpieza",t:"Uso correcto de desinfectantes"},
{sec:"C - Limpieza",t:"Registros de limpieza actualizados"},

/* PLAGAS */
{sec:"D - Plagas",t:"Control de plagas implementado"},
{sec:"D - Plagas",t:"Sin evidencia de infestación"},

/* HACCP */
{sec:"E - HACCP",t:"Análisis de peligros documentado"},
{sec:"E - HACCP",t:"Puntos críticos identificados (CCP)"},
{sec:"E - HACCP",t:"Límites críticos definidos"},
{sec:"E - HACCP",t:"Monitoreo de CCP registrado"},

/* PROCESOS */
{sec:"F - Procesos",t:"Control de temperatura"},
{sec:"F - Procesos",t:"Trazabilidad del producto"},
{sec:"F - Procesos",t:"Control de materia prima"},

/* DOCUMENTACIÓN */
{sec:"G - Documentos",t:"Registros completos y firmados"},
{sec:"G - Documentos",t:"Cumple normativa ARCSA"},
{sec:"G - Documentos",t:"Procedimientos actualizados"},
];

let state = {};

function render(){
  const app = document.getElementById("app");
  app.innerHTML="";

  let actual="";

  CRITERIOS.forEach((c,i)=>{
    state[i]="none";

    if(c.sec!==actual){
      actual=c.sec;
      const h=document.createElement("h3");
      h.textContent="Sección "+c.sec;
      app.appendChild(h);
    }

    const div=document.createElement("div");
    div.className="check-item";
    div.id="item-"+i;

    div.innerHTML=`
      <b>${c.t}</b><br><br>
      <button class="btn" onclick="setVal(${i},'C')">Cumple</button>
      <button class="btn" onclick="setVal(${i},'N')">No Cumple</button>
      <button class="btn" onclick="setVal(${i},'NA')">N/A</button>
    `;

    app.appendChild(div);
  });
}

function setVal(i,val){
  state[i]=val;

  const el=document.getElementById("item-"+i);
  el.classList.remove("ci-cumple","ci-no","ci-na");

  if(val==="C") el.classList.add("ci-cumple");
  if(val==="N") el.classList.add("ci-no");
  if(val==="NA") el.classList.add("ci-na");

  update();
}

function update(){
  let c=0,n=0,na=0;

  Object.values(state).forEach(v=>{
    if(v==="C") c++;
    if(v==="N") n++;
    if(v==="NA") na++;
  });

  let aplica = c+n;
  let pct = aplica>0 ? Math.round((c/aplica)*100) : 0;

  document.getElementById("c").textContent=c;
  document.getElementById("n").textContent=n;
  document.getElementById("na").textContent=na;
  document.getElementById("pct").textContent=pct+"%";
}

render();

</script>

</body>
</html>

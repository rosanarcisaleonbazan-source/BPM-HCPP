<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auditoría BPM & HACCP — Ecuador</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#064e3b;--g800:#065f46;--g700:#047857;--g600:#059669;--g500:#10b981;--g400:#34d399;--g200:#a7f3d0;--g100:#d1fae5;--g50:#ecfdf5;
  --t800:#1e3a8a;--t600:#2563eb;--t400:#60a5fa;--t200:#bfdbfe;--t100:#dbeafe;--gray900:#111827;--gray600:#4b5563;--gray200:#e5e7eb;--gray100:#f3f4f6;--gray50:#f9fafb;
  --white:#ffffff;--page:#f3f4f6;--font:'Plus Jakarta Sans',sans-serif;--r16:16px;--r8:8px;--sh:0 4px 6px -1px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--page);color:var(--gray900);padding-bottom:100px}

/* Barra Superior */
.action-bar{background:var(--g900);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;sticky:top;z-index:999;color:white}
.ab-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:0.2s}
.ab-btn-white{background:var(--white);color:var(--g900)}

/* Contenedor Principal */
.page{max-width:1060px;margin:0 auto;padding:32px 22px}

/* Encabezado */
.hdr{background:linear-gradient(135deg, var(--g900) 0%, var(--g700) 100%);border-radius:20px;padding:32px;color:white;margin-bottom:26px;box-shadow:var(--sh)}
.hdr-txt h1{font-size:28px;font-weight:800;margin-bottom:8px}
.hdr-stats{display:flex;gap:15px;margin-top:20px;background:rgba(0,0,0,0.2);padding:15px;border-radius:12px}
.hstat{flex:1;text-align:center}
.hstat .n{font-size:22px;font-weight:800;color:var(--g400);display:block}
.hstat .l{font-size:10px;text-transform:uppercase;color:rgba(255,255,255,0.6)}

/* Tarjeta de Datos (GRID) */
.machine-card{background:var(--white);border-radius:var(--r16);padding:24px;border:1.5px solid var(--gray200);box-shadow:var(--sh)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;border-bottom:1px dashed var(--gray200);padding-bottom:15px}
.form-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:15px;margin-bottom:15px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px}
.fgroup{display:flex;flex-direction:column;gap:6px}
.fgroup label{font-size:11px;font-weight:700;color:var(--gray600);text-transform:uppercase}
.finput, .fselect{padding:10px;border:1.5px solid var(--gray200);border-radius:var(--r8);font-size:13.5px;outline:none;font-family:var(--font)}
.finput:focus{border-color:var(--g500)}
.req{color:red}

/* Botones de Tipo */
.tipo-btns{display:flex;gap:8px}
.tipo-btn{flex:1;padding:10px;border:1.5px solid var(--gray200);background:white;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s}
.tipo-btn:hover{background:var(--gray50)}
.active-btn{background:var(--g100);border-color:var(--g500);color:var(--g900)}
</style>
</head>
<body>

<div class="action-bar">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:8px;height:8px;background:var(--g400);border-radius:50%"></div>
    <span style="font-size:12px;font-weight:600">AUDITORÍA BPM & HACCP · ECUADOR</span>
  </div>
  <button class="ab-btn ab-btn-white" onclick="window.print()">Descargar Reporte PDF</button>
</div>

<div class="page">
  <div class="hdr">
    <div class="hdr-txt">
      <h1>Checklist de Auditoría BPM / HACCP</h1>
      <p>Control de cumplimiento técnico basado en la normativa ARCSA 067 para plantas de alimentos.</p>
    </div>
    <div class="hdr-stats">
      <div class="hstat"><span class="n">120</span><span class="l">Criterios</span></div>
      <div class="hstat"><span class="n">0</span><span class="l">Cumple</span></div>
      <div class="hstat"><span class="n">0</span><span class="l">No Cumple</span></div>
      <div class="hstat"><span class="n">0%</span><span class="l">Inocuidad</span></div>
    </div>
  </div>

  <div class="machine-card">
    <div class="card-header">
      <div style="background:var(--g50);padding:8px;border-radius:8px">🏠</div>
      <div>
        <h2 style="font-size:16px">Identificación de la Planta de Alimentos</h2>
        <p style="font-size:12px;color:var(--gray600)">Datos legales para el registro de inspección</p>
      </div>
    </div>

    <div class="form-grid">
      <div class="fgroup">
        <label>🏢 Razón Social <span class="req">*</span></label>
        <input class="finput" type="text" placeholder="Ej. Lácteos del Austro S.A.">
      </div>
      <div class="fgroup">
        <label>🆔 RUC (13 dígitos) <span class="req">*</span></label>
        <input class="finput" type="text" placeholder="Ej. 1790000000001">
      </div>
      <div class="fgroup">
        <label>📜 Permiso ARCSA</label>
        <input class="finput" type="text" placeholder="Código de permiso">
      </div>
    </div>

    <div class="form-grid">
      <div class="fgroup">
        <label>📍 Provincia / Ciudad</label>
        <input class="finput" type="text" placeholder="Ej. Guayas / Guayaquil">
      </div>
      <div class="fgroup">
        <label>🏗️ Categoría MIPYME <span class="req">*</span></label>
        <select class="fselect">
          <option>Seleccione...</option>
          <option>Microempresa</option>
          <option>Pequeña Industria</option>
          <option>Mediana Industria</option>
          <option>Grande Industria</option>
        </select>
      </div>
      <div class="fgroup">
        <label>📞 Teléfono</label>
        <input class="finput" type="text" placeholder="Ej. 0990000000">
      </div>
    </div>

    <div class="form-grid-2">
      <div class="fgroup">
        <label>🥫 Línea de Producción <span class="req">*</span></label>
        <input class="finput" type="text" placeholder="Ej. Elaboración de cárnicos">
      </div>
      <div class="fgroup">
        <label>🛡️ Tipo de Auditoría <span class="req">*</span></label>
        <div class="tipo-btns">
          <button class="tipo-btn active-btn">Interna</button>
          <button class="tipo-btn">ARCSA</button>
          <button class="tipo-btn">Certificación</button>
        </div>
      </div>
    </div>

    <div class="form-grid">
      <div class="fgroup">
        <label>📅 Fecha Inspección <span class="req">*</span></label>
        <input class="finput" type="date">
      </div>
      <div class="fgroup">
        <label>👤 Auditor Líder <span class="req">*</span></label>
        <input class="finput" type="text" placeholder="Nombre completo">
      </div>
      <div class="fgroup">
        <label>💼 Cargo</label>
        <input class="finput" type="text" placeholder="Ej. Jefe de Calidad">
      </div>
    </div>
  </div>
</div>

</body>
</html>
